<!DOCTYPE html>
<html>
<head>
    <title>HSK Test Score Report</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
        }
        .container {
            width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border: 1px solid #ccc;
        }
        .title {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }
        .subtitle {
            text-align: center;
            font-size: 14px;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        table, td, th {
            border: 1px solid black;
            padding: 8px;
        }
        .qr {
            text-align: right;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">HSK Test Score Report</div>
        <div class="subtitle">汉语水平考试成绩报告</div>

        <table>
            <tr>
                <td>Name</td>
                <td>MOHIT</td>
            </tr>
            <tr>
                <td>Test Level</td>
                <td>HSK Level 4</td>
            </tr>
            <tr>
                <td>Test Date</td>
                <td>2026-3-22</td>
            </tr>
            <tr>
                <td>Listening</td>
                <td>82</td>
            </tr>
            <tr>
                <td>Reading</td>
                <td>76</td>
            </tr>
            <tr>
                <td>Writing</td>
                <td>80</td>
            </tr>
            <tr>
                <td>Total</td>
                <td>238</td>
            </tr>
        </table>

        <div class="qr">
            <img src="qr.png" width="120">
        </div>
    </div>
</body>
</html>
